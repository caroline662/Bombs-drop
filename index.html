  width:854px;height:1490px;
  background:transparent;
  overflow:hidden;
  cursor:crosshair;
}

#canvas{position:absolute;inset:0;width:100%;height:100%;}
#aim-overlay{position:absolute;inset:0;pointer-events:none;z-index:30;}

.screen{
  display:none;position:absolute;inset:0;z-index:50;
  background:rgba(5,2,25,0.88);backdrop-filter:blur(10px);
  flex-direction:column;align-items:center;justify-content:center;
  gap:14px;border-radius:20px;
}
.screen.show{display:flex;}
.screen h2{
  font-family:'Oxanium',sans-serif;font-size:2.6rem;
  background:linear-gradient(135deg,#ff6bdb,#ffde59);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;text-align:center;
}
.screen p{color:#c0a8f0;font-size:1rem;text-align:center;max-width:220px;}
.screen .big{font-family:'Oxanium',sans-serif;font-size:3rem;color:#ffe066;text-shadow:0 0 20px rgba(255,224,102,0.6);}
.play-btn{
  background:linear-gradient(135deg,#ff6bdb,#9b3fff);
  border:none;color:white;font-family:'Oxanium',sans-serif;font-size:1.2rem;
  padding:14px 44px;border-radius:50px;cursor:pointer;
  box-shadow:0 4px 0 #5b0f99,0 0 20px rgba(155,63,255,0.5);transition:transform .1s;
}
.play-btn:active{transform:translateY(3px);}
</style>
</head>
<body onload="initGame()">
<div id="wrap">
  <div id="frame">
    <canvas id="canvas" width="854" height="1490"></canvas>
    <svg id="aim-overlay" viewBox="0 0 854 1490" style="position:absolute;inset:0;pointer-events:none;z-index:30;"></svg>
    <div class="screen" id="screen-start">
      <h2>Bombs Drop</h2>
      <p>Aim and shoot — destroy shapes before they reach the top!</p>
      <button class="play-btn" onclick="startGame()">Play</button>
    </div>
    <div class="screen" id="screen-over">
      <h2>Game Over</h2>
      <div class="big" id="over-step">Step 01</div>
      <p>A shape reached the top!</p>
      <button class="play-btn" onclick="startGame()">Try Again</button>
    </div>
  </div>
</div>

<script type="text/javascript" src="./js/game.js"></script>
</body>
</html>
